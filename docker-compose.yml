services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: mihenkai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mihenkai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-mihenkai_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - eval_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mihenkai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: mihenkai_redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - eval_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: mihenkai_backend
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mihenkai_user}:${POSTGRES_PASSWORD:-secure_password}@db:5432/${POSTGRES_DB:-mihenkai_db}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-grok/llama-3.1-8b-instant}
      DEEPEVAL_API_KEY: ${DEEPEVAL_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eval_network
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    restart: unless-stopped

  # RQ Worker
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: mihenkai_worker
    command: python -m src.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mihenkai_user}:${POSTGRES_PASSWORD:-secure_password}@db:5432/${POSTGRES_DB:-mihenkai_db}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-grok/llama-3.1-8b-instant}
      DEEPEVAL_API_KEY: ${DEEPEVAL_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eval_network
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: mihenkai_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eval_network
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

networks:
  eval_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local



